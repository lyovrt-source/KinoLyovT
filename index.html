<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kino Hub Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --red: #e50914; --black: #141414; }
        body { font-family: sans-serif; background: var(--black); color: white; text-align: center; margin: 0; padding: 10px; }
        .box { background: #222; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        input { width: 80%; padding: 10px; margin: 5px; border-radius: 5px; border: none; background: #333; color: white; }
        button { padding: 10px 20px; background: var(--red); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        video { width: 100%; max-width: 800px; border-radius: 8px; background: black; margin-top: 10px; }
        .status { font-size: 0.8rem; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <h2 style="color: var(--red);">🍿 KINO HUB PRO</h2>

    <div class="box">
        <div>Քո ID: <b id="my-id" style="color: #0dff00;">...</b></div>
        <input type="text" id="friend-id" placeholder="Ընկերոջդ ID-ն">
        <button onclick="connectToFriend()">Միանալ</button>
        <div id="conn-status" class="status">Անջատված է</div>
    </div>

    <div class="box">
        <input type="text" id="video-url" placeholder="Տեղադրիր վիդեոյի լինկը">
        <button onclick="loadAndSendVideo()">🎥 Բացել բոլորի մոտ</button>
    </div>

    <video id="mainVideo" controls playsinline></video>

<script>
    const video = document.getElementById('mainVideo');
    const peer = new Peer();
    let conn;

    peer.on('open', id => document.getElementById('my-id').innerText = id);

    // Երբ ընկերդ է միանում քեզ
    peer.on('connection', c => {
        conn = c;
        setupConnection();
    });

    // Մենք ենք միանում ընկերոջը
    function connectToFriend() {
        const fId = document.getElementById('friend-id').value;
        conn = peer.connect(fId);
        setupConnection();
    }

    function setupConnection() {
        document.getElementById('conn-status').innerText = "Միացված է ✅";
        document.getElementById('conn-status').style.color = "#0dff00";

        conn.on('data', data => {
            if (data.type === 'load') {
                video.src = data.url;
                video.play();
            }
            if (data.type === 'play') video.play();
            if (data.type === 'pause') video.pause();
            if (data.type === 'sync') {
                if (Math.abs(video.currentTime - data.time) > 1) {
                    video.currentTime = data.time;
                }
            }
        });
    }

    function loadAndSendVideo() {
        const url = document.getElementById('video-url').value;
        if (!url) return alert("Հղումը դիր");
        
        video.src = url;
        video.play();

        if (conn && conn.open) {
            conn.send({ type: 'load', url: url });
        }
    }

    // Սինխրոնիզացիա սեղմելիս
    video.onplay = () => conn?.send({ type: 'play' });
    video.onpause = () => conn?.send({ type: 'pause' });
    setInterval(() => {
        if (conn && conn.open && !video.paused) {
            conn.send({ type: 'sync', time: video.currentTime });
        }
    }, 2000);
</script>
</body>
</html>
