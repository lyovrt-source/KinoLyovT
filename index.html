<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Cinema Hub</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: white; margin: 0; overflow: hidden; }
        .nav-bar { background: #222; padding: 10px; display: flex; gap: 5px; border-bottom: 2px solid #e50914; }
        input { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; background: #333; color: white; }
        button { padding: 10px; background: #e50914; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .viewer { width: 100vw; height: calc(100vh - 60px); border: none; background: white; }
        .id-info { font-size: 10px; color: #888; position: absolute; bottom: 5px; left: 5px; }
    </style>
</head>
<body>

<div class="nav-bar">
    <input type="text" id="url-input" placeholder="Տեղադրիր ցանկացած սայթի հղում...">
    <button onclick="syncBrowse()">🚀 Բացել բոլորի մոտ</button>
    <input type="text" id="peer-id-input" style="width: 80px;" placeholder="Friend ID">
    <button onclick="connect()">Connect</button>
</div>

<iframe id="browser-frame" class="viewer" src="about:blank"></iframe>

<div class="id-info">Քո ID: <span id="my-id">...</span></div>

<script>
    const frame = document.getElementById('browser-frame');
    const peer = new Peer();
    let conn;

    peer.on('open', id => document.getElementById('my-id').innerText = id);

    // Երբ ընկերդ միանում է
    peer.on('connection', c => {
        conn = c;
        setupReceiver();
    });

    // Միանալ ընկերոջը
    function connect() {
        const id = document.getElementById('peer-id-input').value;
        conn = peer.connect(id);
        setupReceiver();
    }

    function setupReceiver() {
        conn.on('data', data => {
            if (data.type === 'nav') {
                frame.src = data.url;
            }
        });
        alert("Միացված է:");
    }

    function syncBrowse() {
        let url = document.getElementById('url-input').value;
        if (!url.startsWith('http')) url = 'https://' + url;
        
        frame.src = url;
        if (conn) {
            conn.send({ type: 'nav', url: url });
        }
    }
</script>
</body>
</html>
