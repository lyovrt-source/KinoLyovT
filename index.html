<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinoHub Pro - Մշտական ID</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --red: #e50914; --dark: #141414; --panel: #1f1f1f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Վերևի վահանակ */
        .setup-bar { background: var(--panel); padding: 12px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 2px solid var(--red); align-items: center; justify-content: center; }
        .id-label { font-size: 12px; color: #aaa; }
        .my-id-display { color: var(--red); font-weight: bold; background: #000; padding: 4px 8px; border-radius: 4px; border: 1px solid #333; }
        
        input { padding: 8px; border-radius: 5px; border: 1px solid #333; background: #000; color: white; flex: 1; min-width: 120px; }
        button { padding: 8px 15px; background: var(--red); border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }

        /* Վիդեոյի բաժին */
        .main-content { flex: 2; display: flex; flex-direction: column; background: #000; position: relative; }
        video { width: 100%; height: 100%; max-height: 60vh; background: #000; }

        /* Չատի բաժին */
        .chat-section { flex: 1; background: #1a1a1a; display: flex; flex-direction: column; border-top: 1px solid #333; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; display: flex; flex-direction: column; gap: 5px; }
        .msg { padding: 5px 10px; border-radius: 5px; background: #262626; width: fit-content; max-width: 80%; }
        .msg.me { background: var(--red); align-self: flex-end; }

        .chat-input-area { padding: 10px; display: flex; gap: 5px; background: #222; }
    </style>
</head>
<body>

<div class="setup-bar">
    <div class="id-label">Քո ID: <span id="my-id" class="my-id-display">...</span></div>
    <input type="text" id="friend-id" placeholder="Ընկերոջ ID-ն">
    <button onclick="connectToFriend()">Միանալ</button>
    <input type="text" id="video-url" placeholder="Վիդեոյի լինկը (.mp4)">
    <button onclick="loadAndSendVideo()">Բացել</button>
</div>

<div class="main-content">
    <video id="mainVideo" controls playsinline></video>
</div>

<div class="chat-section">
    <div id="chat-messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chat-msg" placeholder="Գրիր նամակ...">
        <button onclick="sendChatMessage()">Ուղարկել</button>
    </div>
</div>

<script>
    const video = document.getElementById('mainVideo');
    const chatLog = document.getElementById('chat-messages');
    const myIdDisplay = document.getElementById('my-id');
    
    // --- 1. ՄՇՏԱԿԱՆ ԿԱՐՃ ID-Ի ՏՐԱՄԱԲԱՆՈՒԹՅՈՒՆ ---
    let mySavedId = localStorage.getItem('kino-hub-v1');
    if (!mySavedId) {
        mySavedId = Math.floor(1000 + Math.random() * 9000).toString(); // 4 նիշանոց թիվ
        localStorage.setItem('kino-hub-v1', mySavedId);
    }
    
    const peer = new Peer(mySavedId);
    let conn;

    peer.on('open', id => {
        myIdDisplay.innerText = id;
    });

    // --- 2. ԿԱՊԻ ՀԱՍՏԱՏՈՒՄ ---
    peer.on('connection', c => {
        conn = c;
        setupDataHandlers();
    });

    function connectToFriend() {
        const fId = document.getElementById('friend-id').value;
        if (!fId) return alert("Գրիր ընկերոջդ ID-ն");
        conn = peer.connect(fId);
        setupDataHandlers();
    }

    function setupDataHandlers() {
        conn.on('open', () => {
            addMessage("Համակարգ", "Միացված եք ընկերոջը ✅");
        });

        conn.on('data', data => {
            if (data.type === 'video') {
                video.src = data.url;
                addMessage("Ընկեր", "Փոխեց վիդեոն");
            } else if (data.type === 'chat') {
                addMessage("Ընկեր", data.msg);
            } else if (data.type === 'sync') {
                if (Math.abs(video.currentTime - data.time) > 2) {
                    video.currentTime = data.time;
                }
            }
        });
    }

    // --- 3. ՖՈՒՆԿՑԻԱՆԵՐ ---
    function loadAndSendVideo() {
        const url = document.getElementById('video-url').value;
        if (!url) return;
        video.src = url;
        if (conn && conn.open) {
            conn.send({ type: 'video', url: url });
        }
    }

    function sendChatMessage() {
        const input = document.getElementById('chat-msg');
        const msg = input.value;
        if (!msg || !conn) return;

        conn.send({ type: 'chat', msg: msg });
        addMessage("Ես", msg, true);
        input.value = "";
    }

    function addMessage(sender, text, isMe = false) {
        const div = document.createElement('div');
        div.className = isMe ? "msg me" : "msg";
        div.innerText = sender + ": " + text;
        chatLog.appendChild(div);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    // --- 4. ՍԻՆԽՐՈՆԻԶԱՑԻԱ (2 վայրկյանը մեկ) ---
    setInterval(() => {
        if (conn && conn.open && !video.paused) {
            conn.send({ type: 'sync', time: video.currentTime });
        }
    }, 2000);
</script>

</body>
</html>
