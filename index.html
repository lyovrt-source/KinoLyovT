<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart KinoHub - Universal Scanner</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --red: #ff0000; --dark: #0f0f0f; --panel: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Control Panel */
        .header { background: var(--panel); padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 2px solid var(--red); justify-content: center; z-index: 10; }
        .id-tag { background: #000; border: 1px solid #333; padding: 5px 10px; border-radius: 5px; color: var(--red); font-weight: bold; font-size: 14px; }
        
        input { padding: 10px; border-radius: 5px; border: 1px solid #333; background: #000; color: white; flex: 1; min-width: 150px; }
        button { padding: 10px 15px; background: var(--red); border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        
        /* Content Area */
        .content { flex: 2; display: flex; flex-direction: column; background: #000; position: relative; }
        video { width: 100%; height: 100%; max-height: 65vh; outline: none; }

        /* Chat & Logs */
        .chat-area { flex: 1; background: #141414; display: flex; flex-direction: column; border-top: 1px solid #333; }
        #logs { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; color: #bbb; display: flex; flex-direction: column; gap: 4px; }
        .log-entry { border-left: 2px solid var(--red); padding-left: 8px; margin-bottom: 2px; }
        .chat-input { padding: 10px; display: flex; gap: 5px; background: #1a1a1a; }
    </style>
</head>
<body>

<div class="header">
    <div class="id-tag">ID: <span id="my-id">...</span></div>
    <input type="text" id="friend-id" placeholder="Ընկերոջ ID">
    <button onclick="connect()">Միանալ</button>
    <input type="text" id="target-url" placeholder="Սայթի հասցեն (hayer.tv, և այլն)">
    <button onclick="scanAndPlay()">🔍 Սկանավորել ու Բացել</button>
</div>

<div class="content">
    <video id="mainVideo" controls playsinline></video>
</div>

<div class="chat-area">
    <div id="logs">
        <div class="log-entry">Համակարգ: Պատրաստ է։ Մտցրեք սայթի հասցեն։</div>
    </div>
    <div class="chat-input">
        <input type="text" id="chat-msg" placeholder="Գրիր ընկերոջդ...">
        <button onclick="sendMsg()">➡️</button>
    </div>
</div>

<script>
    const video = document.getElementById('mainVideo');
    const logs = document.getElementById('logs');
    const myIdDisplay = document.getElementById('my-id');

    // Մշտական ID-ի տրամաբանություն
    let savedId = localStorage.getItem('hub-id-v2') || Math.floor(1000 + Math.random() * 9000).toString();
    localStorage.setItem('hub-id-v2', savedId);

    const peer = new Peer(savedId);
    let conn;

    peer.on('open', id => myIdDisplay.innerText = id);
    peer.on('connection', c => { conn = c; setupConn(); });

    function connect() {
        const fId = document.getElementById('friend-id').value;
        conn = peer.connect(fId);
        setupConn();
    }

    function setupConn() {
        conn.on('open', () => addLog("Միացված է ընկերոջը ✅"));
        conn.on('data', data => {
            if (data.type === 'video') { video.src = data.url; video.play(); addLog("Ընկերը նոր վիդեո միացրեց"); }
            if (data.type === 'msg') addLog("Ընկեր: " + data.text);
            if (data.type === 'sync') { if(Math.abs(video.currentTime - data.time) > 2) video.currentTime = data.time; }
        });
    }

    // --- ՍԿԱՆԵՐԻ ՖՈՒՆԿՑԻԱՆ ---
    async function scanAndPlay() {
        const url = document.getElementById('target-url').value;
        if (!url) return;
        
        addLog("Որոնում եմ վիդեո ֆայլը... 🔎");

        // Օգտագործում ենք AllOrigins Proxy սայթի ներսը տեսնելու համար
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

        try {
            const res = await fetch(proxyUrl);
            const data = await res.json();
            const html = data.contents;

            // Փնտրում ենք MP4, M3U8 կամ ուղիղ վիդեո հղումներ
            const regex = /https?:\/\/[^"']+\.(?:mp4|m3u8|webm|mov)[^"']*/gi;
            const found = html.match(regex);

            if (found && found.length > 0) {
                const videoUrl = found[0];
                addLog("Վիդեոն գտնվեց ու միացավ! 🎥");
                video.src = videoUrl;
                video.play();
                if (conn) conn.send({ type: 'video', url: videoUrl });
            } else {
                addLog("Ուղիղ վիդեո չգտնվեց։ Փորձում եմ որպես հղում...");
                video.src = url; // Փորձում ենք ուղղակի որպես աղբյուր
                if (conn) conn.send({ type: 'video', url: url });
            }
        } catch (e) {
            addLog("Սխալ սկանավորման ժամանակ։");
        }
    }

    function addLog(txt) {
        const div = document.createElement('div');
        div.className = "log-entry";
        div.innerText = txt;
        logs.appendChild(div);
        logs.scrollTop = logs.scrollHeight;
    }

    function sendMsg() {
        const m = document.getElementById('chat-msg').value;
        if (conn && m) {
            conn.send({ type: 'msg', text: m });
            addLog("Ես: " + m);
            document.getElementById('chat-msg').value = "";
        }
    }

    // Սինխրոնիզացիա
    setInterval(() => {
        if (conn && conn.open && !video.paused) {
            conn.send({ type: 'sync', time: video.currentTime });
        }
    }, 2000);
</script>
</body>
</html>
