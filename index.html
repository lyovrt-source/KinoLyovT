<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LyovT StreamHub</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
:root{
--red:#ff0000;
--dark:#0f0f0f;
--panel:#1c1c1c;
}

body{
margin:0;
background:var(--dark);
color:white;
font-family:Segoe UI;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

.header{
background:var(--panel);
padding:10px;
display:flex;
flex-wrap:wrap;
gap:8px;
border-bottom:2px solid var(--red);
justify-content:center;
}

.id-box{
background:black;
border:1px solid #333;
padding:6px 12px;
border-radius:6px;
color:var(--red);
font-weight:bold;
}

input{
padding:10px;
background:black;
border:1px solid #333;
color:white;
border-radius:6px;
min-width:140px;
}

button{
background:var(--red);
border:none;
padding:10px 15px;
color:white;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

video{
flex:1;
background:black;
width:100%;
object-fit:contain;
}

.chat{
height:35%;
background:#141414;
display:flex;
flex-direction:column;
border-top:1px solid #333;
}

#logs{
flex:1;
overflow-y:auto;
padding:10px;
font-size:13px;
color:#ccc;
}

.msg{
margin-bottom:5px;
}

.chat-input{
display:flex;
padding:10px;
gap:5px;
background:#1a1a1a;
}
</style>
</head>
<body>

<div class="header">
<div class="id-box">ID: <span id="my-id">...</span></div>
<input type="text" id="friend-id" placeholder="Ընկերոջ ID">
<button onclick="connectPeer()">Միանալ</button>
<button onclick="startStream()">🎬 Ստրիմ</button>
<button onclick="stopStream()">⛔ Stop</button>
</div>

<video id="video" autoplay playsinline controls></video>

<div class="chat">
<div id="logs"></div>
<div class="chat-input">
<input type="text" id="chat-msg" placeholder="Գրիր...">
<button onclick="sendMsg()">➡️</button>
</div>
</div>

<script>
const video = document.getElementById("video");
const logs = document.getElementById("logs");

let savedId = localStorage.getItem("lyovt-id") || 
Math.floor(1000 + Math.random()*9000).toString();

localStorage.setItem("lyovt-id", savedId);

const peer = new Peer(savedId);
let conn;
let currentCall;

peer.on("open", id=>{
document.getElementById("my-id").innerText = id;
addLog("Պատրաստ է ✅");
});

peer.on("connection", c=>{
conn = c;
setupConnection();
});

peer.on("call", call=>{
call.answer();
call.on("stream", stream=>{
video.srcObject = stream;
addLog("Ստացվեց ստրիմ 🎥");
});
currentCall = call;
});

function connectPeer(){
const friendId = document.getElementById("friend-id").value;
if(!friendId) return;

conn = peer.connect(friendId);
setupConnection();
}

function setupConnection(){
conn.on("open", ()=>{
addLog("Միացված է ✅");
});

conn.on("data", data=>{
if(data.type==="msg"){
addLog("Ընկեր: "+data.text);
}
});
}

async function startStream(){
if(!conn){
addLog("Նախ միացիր ընկերոջդ ❗");
return;
}

try{
const stream = await navigator.mediaDevices.getDisplayMedia({
video:true,
audio:true
});

const friendId = document.getElementById("friend-id").value;
currentCall = peer.call(friendId, stream);

video.srcObject = stream;

stream.getVideoTracks()[0].onended = ()=>{
stopStream();
};

addLog("Ստրիմը սկսվեց 🎬");
}
catch(e){
addLog("Չհաջողվեց ստանալ էկրանը");
}
}

function stopStream(){
if(currentCall){
currentCall.close();
currentCall=null;
}
video.srcObject=null;
addLog("Ստրիմը կանգնեց ⛔");
}

function sendMsg(){
const msg = document.getElementById("chat-msg").value;
if(conn && msg){
conn.send({type:"msg", text:msg});
addLog("Ես: "+msg);
document.getElementById("chat-msg").value="";
}
}

function addLog(text){
const div=document.createElement("div");
div.className="msg";
div.innerText=text;
logs.appendChild(div);
logs.scrollTop=logs.scrollHeight;
}
</script>

</body>
</html>
